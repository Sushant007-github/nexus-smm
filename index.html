const DB = {
  async getBalanceFromFirebase(email) {
    if(!email) return 0;
    const fs = await getFS();
    const key = email.toLowerCase().trim().replace(/[@.]/g,"_");
    const snap = await fs.collection("wallets").doc(key).get();
    return snap.exists ? (snap.data().balance ?? 0) : 0;
  },
  async getOrdersFromFirebase() {
    const fs = await getFS();
    const snap = await fs.collection("orders").get();
    return snap.docs.map(d=>d.data()).sort((a,b)=>b.date>a.date?1:-1);
  },
  addOrder(o) { getFS().then(fs => fs.collection("orders").add(o)); },
  async updateUserBalanceAsync(email, balance) {
    const fs = await getFS();
    const key = email.toLowerCase().trim().replace(/[@.]/g,"_");
    await fs.collection("wallets").doc(key).set({balance, email: email.toLowerCase().trim(), ts: Date.now()});
  },
  async pushNotification(email, type, title, body) {
    const fs = await getFS();
    const id = "NOTIF-"+Date.now();
    await fs.collection("notifications").doc(id).set({id, userEmail:email.toLowerCase().trim(), type, title, body, date:today(), createdAt:Date.now(), read:false});
  }
};

const Login = ({ goSignup, onUserLogin, onAdminLogin }) => {
  const [email, setEmail] = useState("");
  const [pass, setPass] = useState("");
  const [loading, setLoading] = useState(false);

  const handle = async () => {
    if(!email || !pass) return;
    setLoading(true);
    try {
      const auth = await getFirebaseAuth();
      const cred = await auth.signInWithEmailAndPassword(email, pass);
      if(cred.user.email.toLowerCase() === ADMIN_EMAIL.toLowerCase()) onAdminLogin();
      else onUserLogin(cred.user.displayName || email.split("@")[0], email);
    } catch(e) { alert(e.message); }
    setLoading(false);
  };

  return (
    <AuthWrap>
      <div style={{ marginBottom: '28px' }}>
        <label className="data-label" style={{ display: 'block', marginBottom: '10px' }}>IDENTITY EMAIL</label>
        <input style={{ width: '100%' }} value={email} onChange={e=>setEmail(e.target.value)} placeholder="name@domain.com" />
      </div>
      <div style={{ marginBottom: '36px' }}>
        <label className="data-label" style={{ display: 'block', marginBottom: '10px' }}>ACCESS CIPHER</label>
        <input style={{ width: '100%' }} type="password" value={pass} onChange={e=>setPass(e.target.value)} placeholder="••••••••" />
      </div>
      <button className="btn-gold" style={{ width: '100%' }} onClick={handle} disabled={loading}>
        {loading ? "AUTHENTICATING..." : "ENTER PORTAL →"}
      </button>
      <p style={{ textAlign: 'center', marginTop: '40px', fontSize: '14px', color: C.muted, fontFamily: 'Space Grotesk' }}>
        New seeker? <span style={{ color: C.gold, fontWeight: 800, cursor: 'pointer', borderBottom: `1px solid ${C.gold}` }} onClick={goSignup}>Initiate Here</span>
      </p>
    </AuthWrap>

};

// ─── ROOT APP ──────────────────────────────────────────────────
function App() {
  const [screen, setScreen] = useState("landing");
  const [user, setUser] = useState({ name: "", email: "" });

  const navigate = (s) => {
    window.scrollTo({ top: 0, behavior: 'smooth' });
    setScreen(s);
  };

  const loginUser = (n, e) => {
    setUser({ name: n, email: e });
    navigate("user");
  };

  return (
    <>
      <GS />
      {screen === "landing" && <Landing goLogin={() => navigate("login")} goSignup={() => navigate("login")} />}
      {screen === "login" && <Login goSignup={() => navigate("landing")} onUserLogin={loginUser} onAdminLogin={() => navigate("admin")} />}
      {screen === "user" && <UserDash userName={user.name} userEmail={user.email} onLogout={() => navigate("landing")} />}
      {screen === "admin" && <AdminDash onLogout={() => navigate("landing")} />}
    </>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
