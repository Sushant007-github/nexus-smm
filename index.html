const DB = {
  async getBalance(email) {
    if(!email) return 0;
    const fs = await getFS();
    const key = email.toLowerCase().trim().replace(/[@.]/g,"_");
    const snap = await fs.collection("wallets").doc(key).get();
    return snap.exists ? (snap.data().balance ?? 0) : 0;
  },
  async getOrders() {
    const fs = await getFS();
    const snap = await fs.collection("orders").get();
    return snap.docs.map(d=>d.data()).sort((a,b)=>b.date>a.date?1:-1);
  },
  async addOrder(o) { const fs = await getFS(); await fs.collection("orders").add(o); },
  async updateUserBalance(email, balance) {
    const fs = await getFS();
    const key = email.toLowerCase().trim().replace(/[@.]/g,"_");
    await fs.collection("wallets").doc(key).set({balance, email: email.toLowerCase().trim(), ts: Date.now()});
  }
};

};

// ── AUTH ─────────────────────────────────────────────────────
const AuthWrap = ({ children, title }) => (
  <div style={{ minHeight: '100vh', display: 'flex', alignItems: 'center', justifyContent: 'center', background: C.bg, position: 'relative', overflow: 'hidden', padding: '24px' }}>
    <div style={{ position: 'absolute', width: '800px', height: '800px', background: 'radial-gradient(circle, rgba(212, 160, 23, 0.05) 0%, transparent 60%)', top: '-10%', left: '-10%', filter: 'blur(100px)' }} />
    <div style={{ width: '100%', maxWidth: '440px', position: 'relative', zIndex: 1 }}>
      <div className="physical-vault">
        <div style={{ textAlign: 'center', marginBottom: '40px' }}>
          <LogoMark size={56} />
          <h2 style={{ marginTop: '24px', fontSize: '32px' }}>{title}</h2>
          <p style={{ color: C.muted, fontSize: '14px' }}>Enter the realm of digital expansion.</p>
        </div>
        {children}
      </div>
    </div>
  </div>
);

const Login = ({ goSignup, onUserLogin, onAdminLogin }) => {
  const [email, setEmail] = useState("");
  const [pass, setPass] = useState("");
  const [loading, setLoading] = useState(false);

  const handle = async () => {
    if(!email || !pass) return;
    setLoading(true);
    try {
      const auth = await getFirebaseAuth();
      const cred = await auth.signInWithEmailAndPassword(email, pass);
      if(cred.user.email.toLowerCase() === ADMIN_EMAIL.toLowerCase()) onAdminLogin();
      else onUserLogin(cred.user.displayName || email.split("@")[0], email);
    } catch(e) { alert(e.message); }
    setLoading(false);
  };

  return (
    <AuthWrap title="Sanctuary Access">
      <div style={{ marginBottom: '24px' }}>
        <label style={{ display: 'block', fontSize: '10px', color: C.gold, marginBottom: '8px', letterSpacing: '2px' }}>IDENTITY EMAIL</label>
        <input style={{ width: '100%' }} value={email} onChange={e=>setEmail(e.target.value)} placeholder="name@domain.com" />
      </div>
      <div style={{ marginBottom: '32px' }}>
        <label style={{ display: 'block', fontSize: '10px', color: C.gold, marginBottom: '8px', letterSpacing: '2px' }}>ACCESS CIPHER</label>
        <input style={{ width: '100%' }} type="password" value={pass} onChange={e=>setPass(e.target.value)} placeholder="••••••••" />
      </div>
      <button className="btn-gold" style={{ width: '100%' }} onClick={handle} disabled={loading}>{loading ? "AUTHENTICATING..." : "ENTER PORTAL →"}</button>
      <p style={{ textAlign: 'center', marginTop: '32px', fontSize: '13px', color: C.muted }}>New seeker? <span style={{ color: C.gold, fontWeight: 700, cursor: 'pointer' }} onClick={goSignup}>Initiate Here</span></p>
    </AuthWrap>
  );
};

// ── APP ROOT ──────────────────────────────────────────────────
function App() {
  const [screen, setScreen] = useState("landing");
  const [user, setUser] = useState(null);

  const loginUser = (n, e) => {
    setUser({ name: n, email: e });
    setScreen("user");
  };

  return (
    <>
      <GS />
      {screen === "landing" && <Landing goLogin={() => setScreen("login")} goSignup={() => setScreen("login")} />}
      {screen === "login" && <Login goSignup={() => setScreen("landing")} onUserLogin={loginUser} onAdminLogin={() => setScreen("admin")} />}
      {screen === "user" && user && <UserDash user={user} onLogout={() => setScreen("landing")} />}
      {screen === "admin" && <div style={{ padding: '100px', textAlign: 'center' }}><Logo/><h2>Admin Command Center</h2><button onClick={()=>setScreen('landing')}>Logout</button></div>}
    </>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
  </script>
